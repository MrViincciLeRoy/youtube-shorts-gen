name: Screenshots Playwright Scraper

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      hook_duration:
        description: 'Hook length in seconds (2 = punchy, 4 = longer)'
        required: false
        default: '2'
      content_duration:
        description: 'Content section length in seconds (default 4)'
        required: false
        default: '4'
      fps:
        description: 'Frames per second (24, 30, or 60)'
        required: false
        default: '30'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright Browsers and System Dependencies
        run: playwright install chromium --with-deps

      - name: Run scraper and save screenshot
        run: |
          mkdir -p assets
          cat << 'PYEOF' > inline_script.py
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  ctx = await browser.new_context(
                      viewport={"width": 393, "height": 852},
                      device_scale_factor=2.75,
                      user_agent="Mozilla/5.0 (Linux; Android 14; Pixel 8) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
                      is_mobile=True,
                      has_touch=True,
                  )
                  page = await ctx.new_page()
                  await page.goto(
                      "https://youtube.com/@Ptanetwok?si=aBmBmLeflHqtAnpN",
                      wait_until="networkidle",
                      timeout=30000,
                  )
                  await page.wait_for_timeout(3000)

                  clicked = await page.evaluate("""
                      () => {
                          const btn = document.querySelector('span.truncated-text-wiz__absolute-button');
                          if (btn) { btn.click(); return true; }
                          return false;
                      }
                  """)

                  if not clicked:
                      more_btn = page.get_by_text("...more")
                      if await more_btn.count() > 0:
                          await more_btn.first.scroll_into_view_if_needed()
                          await more_btn.first.click(force=True)

                  await page.wait_for_timeout(2000)
                  await page.screenshot(path="assets/analytics.png", full_page=False)
                  print("Screenshot saved to assets/analytics.png")
                  await browser.close()

          asyncio.run(main())
          PYEOF
          python inline_script.py

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: analytics-screenshot
          path: assets/analytics.png
          retention-days: 1

      - name: Trigger Generate workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'Generate.yml',
              ref: 'main',
              inputs: {
                hook_duration:    '${{ github.event.inputs.hook_duration    || '2'  }}',
                content_duration: '${{ github.event.inputs.content_duration || '4'  }}',
                fps:              '${{ github.event.inputs.fps              || '30' }}',
                screenshot_run_id: '${{ github.run_id }}'
              }
            });

name: Generate YouTube Short

on:
  workflow_dispatch:
    inputs:
      hook_duration:
        description: 'Hook length in seconds (2 = punchy, 4 = longer)'
        required: false
        default: '2'
      content_duration:
        description: 'Content section length in seconds (default 4)'
        required: false
        default: '4'
      fps:
        description: 'Frames per second (24, 30, or 60)'
        required: false
        default: '30'
      screenshot_run_id:
        description: 'Run ID from Screenshot workflow (leave blank to use latest)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install gdown google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Download analytics screenshot artifact
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const runId = '${{ github.event.inputs.screenshot_run_id }}';
            const { owner, repo } = context.repo;

            let artifacts;
            if (runId) {
              const res = await github.rest.actions.listWorkflowRunArtifacts({
                owner, repo, run_id: parseInt(runId)
              });
              artifacts = res.data.artifacts;
            } else {
              const res = await github.rest.actions.listArtifactsForRepo({
                owner, repo, name: 'analytics-screenshot', per_page: 1
              });
              artifacts = res.data.artifacts;
            }

            const artifact = artifacts.find(a => a.name === 'analytics-screenshot');
            if (!artifact) throw new Error('analytics-screenshot artifact not found');

            const download = await github.rest.actions.downloadArtifact({
              owner, repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            fs.mkdirSync('assets', { recursive: true });
            fs.writeFileSync('/tmp/screenshot.zip', Buffer.from(download.data));

      - name: Unzip screenshot
        run: unzip -o /tmp/screenshot.zip -d assets/

      - name: Download thumbnail video from Google Drive
        run: gdown "https://drive.google.com/uc?id=${{ secrets.GDRIVE_THUMBNAIL_ID }}" -O assets/thumbnail.mp4

      - name: Download sound from Google Drive
        run: gdown "https://drive.google.com/uc?id=${{ secrets.GDRIVE_SOUND_ID }}" -O assets/sound.mp3

      - name: Generate video
        env:
          HOOK_DURATION:    ${{ github.event.inputs.hook_duration    || '2'  }}
          CONTENT_DURATION: ${{ github.event.inputs.content_duration || '4'  }}
          FPS:              ${{ github.event.inputs.fps              || '30' }}
        run: python generate_video.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-short-${{ github.run_number }}
          path: output/short.mp4
          retention-days: 14

